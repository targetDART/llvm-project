stages:          # List of stages for jobs, and their order of execution
  - build
  - compile
  - run
  - deploy

variables: 
  SLURM_PARAM_ACCOUNT: "-A rwth1447"
  SLURM_DPARAM_ACCOUNT: "-A rwth1447"
  SLURM_PARAM_GPUS: "--gres=gpu:volta:2"

.base:
  tags: ["hpc"]
  id_tokens:
    HPC_CI_TOKEN:
      aud: aixCIlenz
  before_script:
    - ml purge
    - ml GCCcore binutils hwloc libxml2 ncurses GMP Z3 libffi elfutils CUDA Ninja gompi

.exec:
  extends: .base
  before_script:
    - ml purge
    - ml GCCcore binutils hwloc libxml2 ncurses GMP Z3 libffi elfutils CUDA gompi
    - export PATH=$PATH:$PWD/software/bin
    - export LIBRARY_PATH=$PWD/software/lib:$LIBRARY_PATH
    - export LD_LIBRARY_PATH=$PWD/software/lib:$LD_LIBRARY_PATH
    - export PSM2_CUDA=1


build-job:       # This job runs in the build stage, which runs first.
  extends: .base
  stage: build
  variables:
    SLURM_PARAM_CORES: "-c 48"
    SLURM_PARAM_TIME:  "-t 2:00:00"
    SLURM_DPARAM_TIME:  "-t 2:00:00"
    GIT_DEPTH: "1"
  script:
    - ls -la $TMP/..
    - export SOURCES=$PWD/llvm
    - mkdir -p $TMP/build-llvm
    - cd $TMP/build-llvm
    - | 
      if [[ ! -f "CMakeCache.txt" ]]; then
        cmake -G Ninja $SOURCES \
           -DCMAKE_BUILD_TYPE=Release\
           -DLLVM_ENABLE_PROJECTS='clang;clang-tools-extra;openmp;lldb;' \
           -DLLVM_ENABLE_RUNTIMES='compiler-rt;libcxx;libcxxabi' \
           -DGCC_INSTALL_PREFIX=$GCCcore_ROOT \
           -DCMAKE_INSTALL_PREFIX=$TMP/software/llvm/16 \
           -DLLVM_INSTALL_UTILS=ON \
           -DCMAKE_CXX_COMPILER='mpicxx' \
           -DCLANG_OPENMP_NVPTX_DEFAULT_ARCH=sm_60 \
           -DLIBOMPTARGET_NVPTX_COMPUTE_CAPABILITIES=35,60,70 \
           -DCMAKE_CXX_FLAGS='-g'
       fi
    - ninja -j48 install
    - cd -
    - mkdir -p software/bin software/lib software/include
    - cp $TMP/software/llvm/16/lib/libomptarget.so.16 software/lib
    - cp -r $TMP/software/llvm/16/lib/clang/16/include software/.
    - mv $TMP/software/llvm/16/bin/clang++ software/bin
    - mv $TMP/software/llvm/16/bin/clang software/bin 
    - mv $TMP/software/llvm/16/bin/clang-16 software/bin
    - tar -cvzf software.tar.gz software 
    - rm -rf $TMP/build-llvm
    - rm -rf $TMP/software
  artifacts:
    paths:
      - software.tar.gz

compile-helloworld-job:
  extends: .exec
  stage: compile
  dependencies: [build-job]
  variables:
    GIT_STRATEGY: none
  script:
    - rm -rf software
    - tar -xzf software.tar.gz
    - echo '#!/bin/bash\n\nsoftware/bin/clang++ -L$PWD/software/lib/libomptarget.so.16 -I$PWD/software/include/ -fopenmp -fopenmp-targets=nvptx64-nvidia-cuda -Xopenmp-target=nvptx64-nvidia-cuda -march=sm_70 $@' > software/bin/clangwrap
    - git clone https://github.com/targetDART/TargetDART_Applications.git
    - chmod +x software/bin/clangwrap
    - ls -la software/bin
    - clang++ -v
    - clangwrap TargetDART_Applications/simple_examples/00notquitehelloworld.cpp -o 00notquitehelloworld.exe  
  artifacts:
    paths:
      - 00notquitehelloworld.exe

run-helloworld-job:
  extends: .exec
  stage: run
  dependencies: [compile-helloworld-job]
  variables:
    GIT_STRATEGY: none
    SLURM_PARAM_CORES: "-c 48"
    SLURM_PARAM_TIME:  "-t 2:00:00"
    SLURM_PARAM_ACCOUNT: "-A rwth1447"
    SLURM_PARAM_NODES: "-n 1"
    SLURM_PARAM_GPUS: "--gres=gpu:volta:2"
  script:
    - TD_MANAGEMENT=0,1,2,3 OMP_PLACES="4:44" srun --gres=gpu:volta:2 -c 48 -n 1 00notquitehelloworld.exe
